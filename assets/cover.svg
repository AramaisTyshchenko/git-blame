<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0d1520"/>
      <stop offset="48%"  stop-color="#111d2e"/>
      <stop offset="52%"  stop-color="#12141a"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </linearGradient>
    <radialGradient id="glow-right" cx="75%" cy="45%" r="38%">
      <stop offset="0%"   stop-color="#f0a500" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#f0a500" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow-right)"/>

  <!-- Grid lines — left half only, dimmer -->
  <g stroke="#1a2a38" stroke-width="1" opacity="0.6">
    <line x1="0"   y1="60"  x2="308" y2="60"/>
    <line x1="0"   y1="120" x2="308" y2="120"/>
    <line x1="0"   y1="180" x2="308" y2="180"/>
    <line x1="0"   y1="240" x2="308" y2="240"/>
    <line x1="0"   y1="300" x2="308" y2="300"/>
    <line x1="80"  y1="0"   x2="80"  y2="360"/>
    <line x1="160" y1="0"   x2="160" y2="360"/>
    <line x1="240" y1="0"   x2="240" y2="360"/>
  </g>

  <!-- Amber top bar -->
  <rect x="0" y="0" width="640" height="4" fill="#f0a500"/>

  <!-- ─────────────────── LEFT HALF: TERMINAL ─────────────────── -->

  <!-- Left accent line -->
  <rect x="14" y="20" width="2" height="320" fill="#f0a500" opacity="0.5"/>

  <!-- Terminal header -->
  <rect x="22" y="22" width="280" height="20" rx="2" fill="#0f1923"/>
  <circle cx="32" cy="32" r="4" fill="#e74c3c" opacity="0.7"/>
  <circle cx="44" cy="32" r="4" fill="#f0a500" opacity="0.7"/>
  <circle cx="56" cy="32" r="4" fill="#27ae60" opacity="0.7"/>
  <text x="74" y="36" font-family="Courier New, monospace" font-size="9" fill="#4a6278">git-blame — bash</text>

  <!-- Code lines -->
  <g font-family="Courier New, monospace" font-size="10.5" fill="#3a6644" opacity="0.85">
    <text x="28" y="60">$ git log --oneline --all</text>
    <text x="28" y="78" fill="#5a8a6a">88f1099 hotfix: typo in error msg</text>
    <text x="28" y="94" fill="#5a8a6a">bc47d03 chore: bump deps</text>
    <text x="28" y="110" fill="#5a8a6a">2d9e5a1 test: add unit tests</text>
    <text x="28" y="126" fill="#5a8a6a">f81a3c2 feat: user profile page</text>
    <text x="28" y="142" fill="#5a8a6a">e2094bf docs: update README</text>
    <!-- Suspicious commit highlighted -->
    <rect x="22" y="150" width="284" height="18" fill="#3a0808" opacity="0.5"/>
    <text x="28" y="163" fill="#e05555">a4f7c2e fix: remove unused assets</text>
    <text x="28" y="181" fill="#8b2222">│ + "client_private_demo.png"</text>
    <text x="28" y="197" fill="#8b2222">│ + "priv_contact_UA.txt"</text>
  </g>

  <!-- git blame output -->
  <g font-family="Courier New, monospace" font-size="10" opacity="0.7">
    <text x="28" y="222" fill="#2e4d5a">$ git blame assets/manifest.json</text>
    <text x="28" y="238" fill="#4a6a5a">e2094bf  aramais  README</text>
    <rect x="22" y="243" width="284" height="16" fill="#3a0808" opacity="0.35"/>
    <text x="28" y="255" fill="#c0392b">a4f7c2e (misha.2025) +client_data</text>
    <text x="28" y="271" fill="#4a6a5a">f81a3c2  anya     Profile.js</text>
  </g>

  <!-- Prompt blink -->
  <text x="28" y="300" font-family="Courier New, monospace" font-size="10.5" fill="#3a6644" opacity="0.7">$ git blame ▌</text>

  <!-- ─────────────────── DIVIDER ─────────────────── -->
  <rect x="310" y="0" width="1" height="356" fill="#f0a500" opacity="0.35"/>
  <rect x="311" y="0" width="1" height="356" fill="#f0a500" opacity="0.10"/>

  <!-- ─────────────────── RIGHT HALF: TITLE ─────────────────── -->

  <!-- Shadowy villain silhouettes (behind title) -->
  <g opacity="0.09">
    <ellipse cx="430" cy="140" rx="36" ry="46" fill="#e74c3c"/>
    <rect x="396" y="183" width="66" height="88" rx="33" fill="#e74c3c"/>
    <ellipse cx="580" cy="150" rx="32" ry="42" fill="#8e44ad"/>
    <rect x="549" y="190" width="60" height="82" rx="30" fill="#8e44ad"/>
  </g>

  <!-- WANTED stamp -->
  <g transform="translate(560, 68) rotate(14)">
    <rect x="-44" y="-13" width="88" height="26" fill="none" stroke="#c0392b" stroke-width="2" rx="2" opacity="0.45"/>
    <text x="0" y="5" text-anchor="middle" font-family="Courier New, monospace" font-size="13" font-weight="bold" fill="#c0392b" letter-spacing="3" opacity="0.45">WANTED</text>
  </g>

  <!-- Title glow -->
  <text x="476" y="178" text-anchor="middle" font-family="Courier New, monospace" font-size="64" font-weight="bold" fill="#f0a500" opacity="0.07" filter="url(#blur)">GIT BLAME</text>

  <!-- Main title -->
  <text x="476" y="172" text-anchor="middle" font-family="Courier New, monospace" font-size="54" font-weight="bold" fill="#f0a500" letter-spacing="4">GIT BLAME</text>

  <!-- Underline -->
  <rect x="324" y="182" width="304" height="2" fill="#a06e00" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="476" y="208" text-anchor="middle" font-family="Courier New, monospace" font-size="11" fill="#7a7470" letter-spacing="4">ДЕТЕКТИВНА ГРА · КОМАНДА TARS</text>

  <!-- 5-year badge -->
  <rect x="421" y="220" width="110" height="22" rx="3" fill="#f0a500" opacity="0.12"/>
  <rect x="421" y="220" width="110" height="22" rx="3" fill="none" stroke="#f0a500" stroke-width="1" opacity="0.4"/>
  <text x="476" y="235" text-anchor="middle" font-family="Courier New, monospace" font-size="11" font-weight="bold" fill="#f0a500" letter-spacing="3" opacity="0.8">★ 5 РОКІВ ★</text>

  <!-- Tagline -->
  <text x="476" y="268" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#d8d4c8" font-style="italic" opacity="0.75">"Хтось злив репо.</text>
  <text x="476" y="284" text-anchor="middle" font-family="Courier New, monospace" font-size="12" fill="#d8d4c8" font-style="italic" opacity="0.75">Хтось завжди зливає."</text>

  <!-- ─────────────────── BOTTOM ─────────────────── -->
  <rect x="0" y="338" width="640" height="18" fill="#070a0e"/>
  <text x="320" y="351" text-anchor="middle" font-family="Courier New, monospace" font-size="9" fill="#1e2d42" letter-spacing="4">TARS · 2021–2026</text>

  <!-- Amber bottom border -->
  <rect x="0" y="356" width="640" height="4" fill="#f0a500"/>
</svg>
