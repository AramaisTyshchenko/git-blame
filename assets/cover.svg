<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <defs>
    <radialGradient id="bg" cx="30%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1a2a40"/>
      <stop offset="100%" stop-color="#0a0e14"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#f0a500" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#f0a500" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="360" fill="url(#bg)"/>
  <rect width="640" height="360" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="#1e2d42" stroke-width="1" opacity="0.5">
    <line x1="0" y1="60" x2="640" y2="60"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="0" y1="180" x2="640" y2="180"/>
    <line x1="0" y1="240" x2="640" y2="240"/>
    <line x1="0" y1="300" x2="640" y2="300"/>
    <line x1="80"  y1="0" x2="80"  y2="360"/>
    <line x1="160" y1="0" x2="160" y2="360"/>
    <line x1="240" y1="0" x2="240" y2="360"/>
    <line x1="320" y1="0" x2="320" y2="360"/>
    <line x1="400" y1="0" x2="400" y2="360"/>
    <line x1="480" y1="0" x2="480" y2="360"/>
    <line x1="560" y1="0" x2="560" y2="360"/>
  </g>

  <!-- Amber top bar -->
  <rect x="0" y="0" width="640" height="4" fill="#f0a500"/>

  <!-- Left accent line -->
  <rect x="48" y="40" width="3" height="280" fill="#f0a500" opacity="0.6"/>

  <!-- Code lines decoration (left side) -->
  <g font-family="Courier New, monospace" font-size="11" fill="#1e3a2a" opacity="0.7">
    <text x="64" y="70">$ git log --oneline</text>
    <text x="64" y="88">a4f7c2e fix: remove unused assets</text>
    <text x="64" y="106" fill="#8b1a1a">+ "client_private_demo.png"</text>
    <text x="64" y="124" fill="#8b1a1a">+ "priv_contact_UA.txt"</text>
    <text x="64" y="142">e2094bf docs: update README</text>
    <text x="64" y="160">f81a3c2 feat: user profile page</text>
    <text x="64" y="178">2d9e5a1 test: add unit tests</text>
    <text x="64" y="196">bc47d03 chore: bump deps</text>
    <text x="64" y="214">88f1099 hotfix: typo in error</text>
  </g>

  <!-- Shadowy figure silhouette (right) -->
  <g opacity="0.12">
    <ellipse cx="530" cy="155" rx="38" ry="48" fill="#e74c3c"/>
    <rect x="496" y="200" width="68" height="90" rx="30" fill="#e74c3c"/>
    <ellipse cx="580" cy="165" rx="34" ry="44" fill="#8e44ad"/>
    <rect x="548" y="206" width="62" height="85" rx="28" fill="#8e44ad"/>
  </g>

  <!-- Red WANTED stamp angle -->
  <g transform="translate(460, 240) rotate(-18)">
    <rect x="-60" y="-18" width="120" height="36" fill="none" stroke="#c0392b" stroke-width="3" rx="2" opacity="0.5"/>
    <text x="0" y="6" text-anchor="middle" font-family="Courier New, monospace" font-size="18" font-weight="bold" fill="#c0392b" letter-spacing="4" opacity="0.5">WANTED</text>
  </g>

  <!-- Main title glow behind -->
  <text x="320" y="196" text-anchor="middle" font-family="Courier New, monospace" font-size="82" font-weight="bold" fill="#f0a500" opacity="0.06" filter="url(#blur)">GIT BLAME</text>

  <!-- Main title -->
  <text x="320" y="192" text-anchor="middle" font-family="Courier New, monospace" font-size="72" font-weight="bold" fill="#f0a500" letter-spacing="6">GIT BLAME</text>

  <!-- Underline -->
  <rect x="120" y="204" width="400" height="2" fill="#a06e00" opacity="0.8"/>

  <!-- Subtitle -->
  <text x="320" y="232" text-anchor="middle" font-family="Courier New, monospace" font-size="14" fill="#8a8478" letter-spacing="5">ДЕТЕКТИВНА ГРА · КОМАНДА TARS · 5 РОКІВ</text>

  <!-- Tagline -->
  <text x="320" y="270" text-anchor="middle" font-family="Courier New, monospace" font-size="15" fill="#e8e4d8" font-style="italic" opacity="0.8">"Хтось злив репо. Хтось завжди зливає."</text>

  <!-- Bottom bar -->
  <rect x="0" y="340" width="640" height="20" fill="#0a0e14"/>
  <text x="320" y="354" text-anchor="middle" font-family="Courier New, monospace" font-size="10" fill="#1e2d42" letter-spacing="3">TARS · 2021–2026</text>

  <!-- Amber bottom border -->
  <rect x="0" y="356" width="640" height="4" fill="#f0a500"/>
</svg>
